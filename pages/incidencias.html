<!DOCTYPE html>
<html lang="es">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1">


<title>SIGET - Incidencias</title>



<link rel="stylesheet" href="../css/estilos.css">

<link rel="stylesheet" href="../css/dashboard.css">



</head>




<body>



<div class="contenido">



<header>



<h1>
🚨 Gestión de Incidencias
</h1>



<button onclick="location.href='dashboard.html'">

⬅ Volver

</button>



</header>









<section class="card">


<h2>
Registrar Incidencia
</h2>





<label>
Tipo de incidencia
</label>


<select id="tipo">


<option>
Accidente
</option>


<option>
Falla técnica
</option>


<option>
Reclamo ciudadano
</option>


<option>
Operativo especial
</option>


<option>
Otro
</option>


</select>







<label>
Prioridad
</label>


<select id="prioridad">


<option>
Baja
</option>


<option>
Media
</option>


<option>
Alta
</option>


<option>
Crítica
</option>


</select>








<label>
Descripción
</label>


<textarea id="descripcion"></textarea>








<label>
Ubicación
</label>


<input 
id="ubicacion"
placeholder="Lugar del hecho">







<button onclick="guardarIncidencia()">

REGISTRAR INCIDENCIA

</button>





</section>









<section class="card">


<h2>
Historial de incidencias
</h2>





<table>


<thead>


<tr>

<th>
ID
</th>


<th>
Tipo
</th>


<th>
Prioridad
</th>


<th>
Estado
</th>


<th>
Responsable
</th>


</tr>


</thead>




<tbody id="listaIncidencias">


</tbody>




</table>



</section>





</div>





<script src="../js/incidencias.js"></script>



</body>



</html>
