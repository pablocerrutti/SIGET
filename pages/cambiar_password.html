<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SIGET - Cambio de contraseña</title>

<link rel="stylesheet" href="../css/estilos.css">

</head>


<body>


<div class="login-container">


<div class="card-login">


<h2>Primer ingreso</h2>


<p>
Debe cambiar su contraseña provisoria.
</p>



<label>
Nueva contraseña
</label>


<input 
type="password"
id="nuevaPassword">



<label>
Confirmar contraseña
</label>


<input 
type="password"
id="confirmarPassword">



<button onclick="cambiarPassword()">

GUARDAR NUEVA CONTRASEÑA

</button>


<div id="mensaje"></div>


</div>


</div>



<script src="../js/cambiar_password.js"></script>


</body>

</html>
