<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGET | Acceso</title>

<link rel="stylesheet" href="css/estilos.css">
<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-container">

    <div class="login-left">

        <div class="logo-box">

            <h1>SIGET</h1>

            <h2>Sistema Integral de Gestión de Evidencias de Tránsito</h2>

	   <p>Dirección Tránsito y Transportes</p>

            <p>Versión Prototipo Institucional</p>

        </div>

    </div>

    <div class="login-right">

        <div class="card-login">

            <h2>Ingreso al Sistema</h2>

            <p>Ingrese sus credenciales institucionales</p>

            <form id="loginForm">

                <label>Usuario</label>

                <input
                    type="text"
                    id="usuario"
                    placeholder="Usuario">

                <label>Contraseña</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña">

                <button type="submit">

                    INGRESAR

                </button>

            </form>

            <div id="mensaje"></div>

            <hr>

            <small>

                Usuario demo:

                admin / admin

            </small>

            <br>

            <small>

                inspector / inspector

            </small>

            <br>

            <small>

                auditor / auditor

            </small>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
